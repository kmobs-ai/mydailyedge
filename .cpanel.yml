---
deployment:
  tasks:
    - export DEPLOYPATH=/home/bjirekar6ity/public_html/
    # Public static assets
    - /bin/cp -f index.html $DEPLOYPATH
    - /bin/cp -f styles.css $DEPLOYPATH
    - /bin/cp -f app.js $DEPLOYPATH
    - /bin/cp -f .htaccess $DEPLOYPATH
    - /bin/cp -f manifest.webmanifest $DEPLOYPATH
    - /bin/cp -f sw.js $DEPLOYPATH
    # Brand assets
    - /bin/cp -f logo.png $DEPLOYPATH
    - /bin/cp -f wordmark.png $DEPLOYPATH
    - /bin/cp -f favicon.png $DEPLOYPATH
    - /bin/cp -f favicon.ico $DEPLOYPATH
    - /bin/cp -f apple-touch-icon.png $DEPLOYPATH
    - /bin/cp -f icon-512.png $DEPLOYPATH
    # API endpoints
    - /bin/mkdir -p ${DEPLOYPATH}api
    - /bin/cp -f api/_bootstrap.php ${DEPLOYPATH}api/
    - /bin/cp -f api/status.php ${DEPLOYPATH}api/
    - /bin/cp -f api/auth.php ${DEPLOYPATH}api/
    - /bin/cp -f api/state.php ${DEPLOYPATH}api/
    - /bin/cp -f api/market.php ${DEPLOYPATH}api/
    - /bin/cp -f api/alerts.php ${DEPLOYPATH}api/
    - /bin/cp -f api/email.php ${DEPLOYPATH}api/
    - /bin/cp -f api/web-push.php ${DEPLOYPATH}api/
    - /bin/cp -f api/push-subscribe.php ${DEPLOYPATH}api/
    - /bin/cp -f api/snapshots.php ${DEPLOYPATH}api/
    - /bin/cp -f api/.htaccess ${DEPLOYPATH}api/
    - /bin/cp -n api/config.sample.php ${DEPLOYPATH}api/config.sample.php
    # Cron worker
    - /bin/mkdir -p ${DEPLOYPATH}api/cron
    - /bin/cp -f api/cron/check-alerts.php ${DEPLOYPATH}api/cron/
    - /bin/cp -f api/cron/generate-vapid.php ${DEPLOYPATH}api/cron/
    - /bin/cp -f api/cron/daily-snapshot.php ${DEPLOYPATH}api/cron/
